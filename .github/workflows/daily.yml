name: Daily Content Build

on:
  schedule:
    - cron: '30 3 * * *'   # 3:30 AM UTC = 9:00 AM IST daily
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: write            # needed to commit generated files

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Run content engine
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        run: python news_engine.py

      - name: Commit and push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Daily build: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
