name: Fetch and Rank Articles

on:
  schedule:
    - cron: '30 16 * * *'   # 4:30 PM UTC = 10:00 PM IST daily
  workflow_dispatch:          # allow manual trigger for testing

permissions:
  contents: write

jobs:
  fetch-and-rank:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-genai

      - name: Fetch articles and rank candidates
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
        run: python fetch_and_rank.py

      - name: Commit review_candidates.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add review_candidates.json
          git diff --cached --quiet || git commit -m "Candidates: $(date -u '+%Y-%m-%d') — ready for review"
          git push
